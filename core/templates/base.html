<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HistoryHealer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
    <style>
        body {
            padding-top: 56px;
            background-color: #121212;
            color: #e0e0e0;
        }
        .sidebar {
            position: fixed;
            top: 56px;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 20px 0;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #1e1e1e;
            border-right: 1px solid #333;
        }
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.75);
            padding: 0.5rem 1rem;
        }
        .sidebar .nav-link:hover {
            color: rgba(255, 255, 255, 1);
            background-color: #333;
        }
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #0d6efd;
        }
        .sidebar .nav-link i {
            margin-right: 10px;
        }
        .main-content {
            margin-left: 240px;
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
            background-color: #2d2d2d;
            border: 1px solid #444;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.2);
        }
        .card-header {
            background-color: #333;
            border-bottom: 1px solid #444;
        }
        .table {
            color: #e0e0e0;
        }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
        }
        .table thead th {
            color: #ffffff;
        }
        .table thead th a {
            color: #ffffff !important;
            text-decoration: none;
        }
        .form-control, .form-select {
            background-color: #333;
            border: 1px solid #555;
            color: #e0e0e0;
        }
        .form-control:focus, .form-select:focus {
            background-color: #3a3a3a;
            color: #fff;
            border-color: #0d6efd;
        }
        @media (max-width: 767.98px) {
            .sidebar {
                top: 56px;
                width: 100%;
                position: relative;
                height: auto;
            }
            .main-content {
                margin-left: 0;
            }
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
        }
        .loading-spinner {
            width: 3rem;
            height: 3rem;
        }
        .badge-fixed {
            background-color: #198754;
        }
        .badge-unmatched {
            background-color: #dc3545;
        }
        .badge-ignored {
            background-color: #6c757d;
        }
        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }
        .pagination .page-link {
            background-color: #333;
            border-color: #444;
            color: #e0e0e0;
        }
        .pagination .page-link:hover {
            background-color: #444;
            border-color: #555;
            color: #fff;
        }
        .pagination .page-item.active .page-link {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
        .pagination .page-item.disabled .page-link {
            background-color: #222;
            border-color: #333;
            color: #666;
        }
        .alert {
            background-color: #2d2d2d;
            border-color: #444;
            color: #e0e0e0;
        }
        .alert-success {
            background-color: rgba(25, 135, 84, 0.2);
            border-color: rgba(25, 135, 84, 0.4);
            color: #75b798;
        }
        .alert-warning {
            background-color: rgba(255, 193, 7, 0.2);
            border-color: rgba(255, 193, 7, 0.4);
            color: #ffda6a;
        }
        .alert-danger {
            background-color: rgba(220, 53, 69, 0.2);
            border-color: rgba(220, 53, 69, 0.4);
            color: #ea868f;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">HistoryHealer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <ul class="navbar-nav ms-auto">
                    <!-- Settings button removed -->
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                                <i class="bi bi-speedometer2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/unmatched' %}active{% endif %}" href="/unmatched">
                                <i class="bi bi-exclamation-triangle"></i> Unmatched Items
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/ignored' %}active{% endif %}" href="/ignored">
                                <i class="bi bi-eye-slash"></i> Ignored Items
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/fixed' %}active{% endif %}" href="/fixed">
                                <i class="bi bi-check-circle"></i> Fixed Items
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/settings' %}active{% endif %}" href="/settings">
                                <i class="bi bi-gear"></i> Settings
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/documentation' %}active{% endif %}" href="/documentation">
                                <i class="bi bi-book"></i> Documentation
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading" style="display: none;">
        <div class="text-center">
            <div class="spinner-border loading-spinner" role="status"></div>
            <h5 class="mt-2" id="loading-message">Processing...</h5>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
    <script>
        // Common functions
        function showLoading(message = "Processing...") {
            $("#loading-message").text(message);
            $(".loading").show();
        }
        
        function hideLoading() {
            $(".loading").hide();
        }
        
        function showAlert(message, type = "success") {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            $("#alerts-container").html(alertHtml);
            
            // Auto-dismiss after 5 seconds
            setTimeout(() => {
                $(".alert").alert('close');
            }, 5000);
        }
    </script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
